<header>
    <div class="collapse-toggle">
        <i class="fa-light fa-xmark" onclick="collapseNav()"></i>
    </div>
    <div class="account-toggle" onclick="accountToggle()">
        <img src="{{ url_for('static', filename='assets/images/user_default.png')}}">
        <span>Usuario</span>
        <i class="fa-light fa-angle-down"></i>
    </div>
    <div class="box-account-config">
            <button onclick="popup(
                [{label: 'Nome', type: 'text'}, {label: 'Senha', type: 'password'},
                 {label: 'Confirmar Senha', type: 'password'}],[], ['Atualizar'],
                 'Minha Conta',
                 'auth',
                 true)
            ">
                <i class="fa-light fa-user"></i>
                <span>Minha Conta</span>
            </button>
            <button onclick="redirect('/')">
                <i class="fa-light fa-right-from-bracket"></i>
                <span>Sair</span>
            </button>
        </div>
</header>
